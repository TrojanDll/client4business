services:
  postgres:
    image: postgres:16-alpine
    container_name: approval-postgres-dev
    environment:
      POSTGRES_USER: approval
      POSTGRES_PASSWORD: approval
      POSTGRES_DB: approval
    ports:
      # host 15432: local services occupy 5432 and 5433
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approval -d approval"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
