name: approval-service

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-approval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-approval}
      POSTGRES_DB: ${POSTGRES_DB:-approval}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-approval}:${POSTGRES_PASSWORD:-approval}@postgres:5432/${POSTGRES_DB:-approval}?schema=public
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres-data:
